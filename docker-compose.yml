services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ims
      POSTGRES_PASSWORD: ims
      POSTGRES_DB: ims
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims -d ims"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      NODE_ENV: production
      POSTGRES_URL: postgres://ims:ims@postgres:5432/ims
      MONGO_URL: mongodb://mongodb:27017/ims
      REDIS_URL: redis://redis:6379
      API_PORT: 4000
      RATE_LIMIT_PER_SECOND: 15000
      DEBOUNCE_THRESHOLD: 100
      DEBOUNCE_WINDOW_SECONDS: 10
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["npm", "run", "start:worker", "--workspace", "backend"]
    environment:
      NODE_ENV: production
      POSTGRES_URL: postgres://ims:ims@postgres:5432/ims
      MONGO_URL: mongodb://mongodb:27017/ims
      REDIS_URL: redis://redis:6379
      DEBOUNCE_THRESHOLD: 100
      DEBOUNCE_WINDOW_SECONDS: 10
    depends_on:
      backend:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      API_INTERNAL_URL: http://backend:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: ws://localhost:4000/ws
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres-data:
  mongo-data:
  redis-data:
